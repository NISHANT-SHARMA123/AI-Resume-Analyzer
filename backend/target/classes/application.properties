# ═══════════════════════════════════════════════════
#  ResumeAI — Application Configuration
# ═══════════════════════════════════════════════════

# Server Port
server.port=8080

# ── Database ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/resumeai_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ── Resume File Storage ───────────────────────────────
app.upload.dir=./uploads

# ── JWT Secret ────────────────────────────────────────
app.jwt.secret=ResumeAI_Super_Secret_Key_2024_Must_Be_Long_Enough_For_Security
app.jwt.expiration=86400000

# ── ML Python Microservice URL ────────────────────────
ml.service.url=http://localhost:5000

# ── CORS ──────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000
